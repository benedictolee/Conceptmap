<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="개념맵">
<meta name="theme-color" content="#4af0c4">
<title>개념맵 — 나만의 과학수학 뇌지도</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#1a1d24;
  --border:rgba(255,255,255,0.07);--accent:#4af0c4;
  --known:#22d3a0;--unknown:#f87171;--partial:#fbbf24;
  --text:#e2e8f0;--muted:#64748b;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:-webkit-fill-available;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  display:flex;flex-direction:column;overflow:hidden;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bot);}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--border);background:var(--surface);
  flex-shrink:0;z-index:20;}
.logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);}
.logo span{color:var(--muted);}
header .sep{flex:1;}
.hbtn{background:none;border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-size:12px;padding:6px 10px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:all .2s;min-height:34px;}
.hbtn:hover,.hbtn:active{border-color:rgba(255,255,255,0.2);color:var(--text);}
.hbtn.danger:active{border-color:var(--unknown);color:var(--unknown);}

/* ── INSTALL BANNER ── */
#installBanner{display:none;align-items:center;gap:10px;padding:9px 14px;
  background:rgba(74,240,196,0.08);border-bottom:1px solid rgba(74,240,196,0.18);
  font-size:12px;color:var(--text);}
#installBanner.show{display:flex;}
#installBanner .sep{flex:1;}
#installBanner button{background:var(--accent);color:#0a0c10;border:none;
  border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── ONBOARDING ── */
#onboarding{position:fixed;inset:0;background:rgba(10,12,16,0.97);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  padding:16px;padding-top:calc(16px + var(--safe-top));}
.ob-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:28px 24px;max-width:520px;width:100%;max-height:calc(100vh - 40px);
  overflow-y:auto;}
.ob-box h1{font-size:19px;font-weight:700;margin-bottom:6px;line-height:1.3;}
.ob-box h1 em{color:var(--accent);font-style:normal;}
.ob-box p{color:var(--muted);font-size:12.5px;line-height:1.7;margin-bottom:20px;}
.ob-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:9px;}
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px;}
.subj-chip{background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;cursor:pointer;font-size:13px;transition:all .2s;
  user-select:none;min-height:42px;display:flex;align-items:center;}
.subj-chip.sel{border-color:var(--accent);background:rgba(74,240,196,0.08);color:var(--accent);}
.api-row{display:flex;gap:7px;margin-bottom:14px;}
.api-row input{flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:12px;padding:9px 11px;outline:none;min-height:42px;}
.api-row input:focus{border-color:rgba(74,240,196,0.35);}
.api-row input::placeholder{color:var(--muted);font-family:'Noto Sans KR',sans-serif;}
.api-tag{background:rgba(251,191,36,.1);color:var(--partial);border-radius:6px;
  padding:4px 9px;font-size:11px;white-space:nowrap;display:flex;align-items:center;}
.ob-start{width:100%;background:var(--accent);color:#0a0c10;border:none;
  border-radius:9px;padding:13px;font-size:14px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;min-height:46px;}
.ob-start:disabled{opacity:.35;cursor:not-allowed;}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── MOBILE: bottom sheet toggle ── */
.sidebar{width:300px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:640px){
  .layout{flex-direction:column;}
  .sidebar{width:100%;flex-shrink:0;border-right:none;
    border-top:1px solid var(--border);
    max-height:0;overflow:hidden;transition:max-height .3s ease;order:2;}
  .sidebar.open{max-height:55vh;}
  .canvas-wrap{flex:1;order:1;}
}
.sidebar-top{padding:12px 12px 10px;border-bottom:1px solid var(--border);}
.sidebar-top h2{font-size:11px;font-weight:500;color:var(--muted);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;line-height:1.7;padding:10px 12px;resize:none;
  height:90px;outline:none;}
textarea:focus{border-color:rgba(74,240,196,0.35);}
textarea::placeholder{color:var(--muted);}
.btn-analyze{margin-top:7px;width:100%;background:var(--accent);color:#0a0c10;
  border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;min-height:44px;}
.btn-analyze:disabled{opacity:.4;cursor:not-allowed;}
.dots span{display:inline-block;animation:blink 1.2s infinite;font-size:16px;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.node-list{flex:1;overflow-y:auto;padding:10px 11px;display:flex;flex-direction:column;gap:6px;}
.node-list::-webkit-scrollbar{width:3px;}
/* single card focus view */
.node-list.focus-mode .concept-card{display:none;}
.node-list.focus-mode .concept-card.active{display:block;}
.node-list.focus-mode .session-label{display:none;}
.focus-bar{display:none;align-items:center;gap:8px;padding:7px 11px 0;font-size:11px;color:var(--muted);}
.focus-bar.show{display:flex;}
.focus-bar .focus-label{flex:1;color:var(--accent);font-weight:600;}
.focus-bar .back-btn{background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-size:11px;padding:4px 9px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.session-label{font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;padding:4px 2px 1px;}
.concept-card{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .2s;}
.concept-card.active{border-color:var(--accent);}
.card-header{display:flex;align-items:flex-start;gap:8px;}
.sdot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.sdot.known{background:var(--known);box-shadow:0 0 5px var(--known);}
.sdot.unknown{background:var(--unknown);box-shadow:0 0 5px var(--unknown);}
.sdot.partial{background:var(--partial);box-shadow:0 0 5px var(--partial);}
.card-title{font-size:13px;font-weight:700;line-height:1.3;flex:1;}
.card-edit-btn{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:14px;padding:0 4px;flex-shrink:0;min-width:28px;min-height:28px;
  display:flex;align-items:center;justify-content:center;}
.card-body{font-size:12px;color:#94a3b8;line-height:1.65;margin-top:6px;}
.card-formula{display:block;font-family:'Space Mono',monospace;font-size:11.5px;
  color:#c4b5fd;background:rgba(167,139,250,0.08);border-left:2px solid rgba(167,139,250,0.4);
  border-radius:0 6px 6px 0;padding:5px 10px;margin:7px 0;line-height:1.6;white-space:pre-wrap;}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;
  margin-top:5px;font-weight:500;}
.tag.known{background:rgba(34,211,160,.1);color:var(--known);}
.tag.unknown{background:rgba(248,113,113,.1);color:var(--unknown);}
.tag.partial{background:rgba(251,191,36,.1);color:var(--partial);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--muted);font-size:13px;text-align:center;
  gap:8px;padding:20px;}
.empty-icon{font-size:30px;opacity:.3;}

/* ── CANVAS ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;}
.canvas-wrap::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;z-index:0;}
canvas#mapCanvas{position:absolute;inset:0;z-index:1;
  touch-action:none; /* ★ 핵심: 브라우저 기본 터치 동작 차단 */
}

/* ── FAB (mobile) ── */
.fab{display:none;position:absolute;bottom:calc(16px + var(--safe-bot));right:16px;
  background:var(--accent);color:#0a0c10;border:none;border-radius:50%;
  width:52px;height:52px;font-size:22px;cursor:pointer;z-index:15;
  box-shadow:0 4px 20px rgba(74,240,196,0.4);align-items:center;justify-content:center;}
@media(max-width:640px){.fab{display:flex;}}

.canvas-toolbar{position:absolute;bottom:calc(14px + var(--safe-bot));right:14px;
  display:flex;gap:6px;z-index:10;}
@media(max-width:640px){.canvas-toolbar{right:80px;}}
.ctbtn{background:var(--surface);border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-size:12px;padding:7px 12px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;min-height:36px;}
.ctbtn.on{border-color:var(--accent);color:var(--accent);}

.legend{position:absolute;bottom:calc(14px + var(--safe-bot));left:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:8px 12px;font-size:11px;display:none;flex-direction:column;gap:4px;z-index:10;}
.legend.show{display:flex;}
.legend-item{display:flex;align-items:center;gap:7px;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:6px 14px;font-size:11.5px;color:var(--accent);z-index:10;
  pointer-events:none;white-space:nowrap;}

/* ── MODALS ── */
#editModal{position:fixed;inset:0;background:rgba(10,12,16,.85);
  z-index:500;display:none;align-items:flex-end;justify-content:center;}
#editModal.open{display:flex;}
@media(min-width:641px){
  #editModal{align-items:center;}
  .modal-box{border-radius:14px!important;}
}
.modal-box{background:var(--surface);border:1px solid var(--border);
  border-radius:18px 18px 0 0;padding:24px 22px;
  padding-bottom:calc(24px + var(--safe-bot));
  width:100%;max-width:480px;}
.modal-box h3{font-size:14px;font-weight:700;margin-bottom:14px;}
.mf{margin-bottom:11px;}
.mf label{font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;display:block;margin-bottom:4px;}
.mf input,.mf textarea,.mf select{width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:9px 11px;
  outline:none;min-height:42px;}
.mf textarea{resize:none;height:72px;line-height:1.6;}
.mf select option{background:var(--surface2);}
.modal-actions{display:flex;gap:7px;margin-top:16px;justify-content:flex-end;}
.mbtn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;min-height:42px;}
.mbtn.cancel{background:var(--surface2);color:var(--muted);}
.mbtn.save{background:var(--accent);color:#0a0c10;}
.mbtn.del{background:rgba(248,113,113,.1);color:var(--unknown);}
.api-modal-box p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
.api-modal-box input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:12px;padding:9px 12px;outline:none;margin-bottom:12px;min-height:42px;}

#tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:10px 13px;max-width:220px;font-size:12px;
  line-height:1.65;pointer-events:none;opacity:0;transition:opacity .15s;
  z-index:300;box-shadow:0 8px 28px rgba(0,0,0,.5);}
#tooltip.show{opacity:1;}
#ttTitle{font-weight:700;font-size:12.5px;margin-bottom:3px;}
#ttBody{color:#94a3b8;}

/* ── IMAGE ATTACHMENTS ── */
.card-images{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
/* 질문 입력란 이미지 첨부 */
.input-img-row{display:flex;gap:6px;align-items:center;margin-top:7px;flex-wrap:wrap;}
.input-img-thumb{position:relative;width:52px;height:52px;border-radius:7px;overflow:hidden;
  border:1px solid var(--border);flex-shrink:0;}
.input-img-thumb img{width:100%;height:100%;object-fit:cover;}
.input-img-thumb .del-img{position:absolute;top:1px;right:1px;background:rgba(0,0,0,.75);
  border:none;color:#fff;border-radius:50%;width:16px;height:16px;
  font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.input-img-add{display:flex;gap:5px;margin-top:5px;}
.input-img-btn{flex:1;border:1px solid var(--border);border-radius:7px;
  background:var(--surface2);color:var(--muted);font-size:11px;
  padding:7px 4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  min-height:36px;text-align:center;}
.input-img-btn:active{border-color:var(--accent);color:var(--accent);}
.analyzing-img{font-size:10px;color:var(--accent);padding:3px 0;}
.card-img{width:64px;height:64px;border-radius:7px;object-fit:cover;
  border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
.card-img:active{opacity:.8;}

/* image picker in modal */
.img-section{margin-bottom:11px;}
.img-section label{font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;display:block;margin-bottom:6px;}
.img-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.img-thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);flex-shrink:0;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb .del-img{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);
  border:none;color:#fff;border-radius:50%;width:18px;height:18px;
  font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-img-btn{width:64px;height:64px;border-radius:8px;border:1px dashed var(--border);
  background:var(--surface2);color:var(--muted);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.add-img-btn:active{background:#1e222b;}
.img-input-row{display:flex;gap:6px;margin-top:6px;}
.img-source-btn{flex:1;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--muted);font-size:12px;
  padding:9px 4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  min-height:42px;text-align:center;}
.img-source-btn:active{border-color:var(--accent);color:var(--accent);}

/* lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;
  display:none;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;object-fit:contain;}
#lightbox .close-lb{position:absolute;top:16px;right:16px;background:none;
  border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1;}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-box">
    <h1>나만의 <em>과학수학 뇌지도</em></h1>
    <p>질문을 입력하면 내가 아는 것/모르는 것을 파악하고,<br>질문이 쌓일수록 연결되는 지식 맵을 만들어드려요.</p>
    <div class="ob-label">수강 과목 선택 (복수 가능)</div>
    <div class="subject-grid" id="subjectGrid">
      <div class="subj-chip" data-id="calculus">미분적분학</div>
      <div class="subj-chip" data-id="linalg">선형대수학</div>
      <div class="subj-chip" data-id="diffEq">공업수학/미분방정식</div>
      <div class="subj-chip" data-id="physics">일반물리학</div>
      <div class="subj-chip" data-id="em">전자기학/전자장론</div>
      <div class="subj-chip" data-id="circuit">기초회로이론</div>
      <div class="subj-chip" data-id="semicond">반도체공학</div>
      <div class="subj-chip" data-id="quantum">양자역학</div>
      <div class="subj-chip" data-id="thermo">열역학/통계역학</div>
      <div class="subj-chip" data-id="signal">신호 및 시스템</div>
    </div>
    <button class="ob-start" id="obStart" onclick="startApp()" disabled>시작하기 →</button>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <span>📲 홈 화면에 추가하면 앱처럼 사용할 수 있어요</span>
  <div class="sep"></div>
  <button id="installBtn">설치</button>
  <button onclick="document.getElementById('installBanner').classList.remove('show')"
    style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px;">✕</button>
</div>

<header>
  <div class="logo">concept<span>map</span></div>
  <div class="sep"></div>
  <button class="hbtn" onclick="openOnboarding()">📚</button>
  <button class="hbtn danger" onclick="clearAll()">초기화</button>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <h2>질문 입력</h2>
      <textarea id="input" placeholder="헷갈리는 걸 말하듯 입력하세요&#10;예) 순방향바이어스에서 확산이랑 표동 차이가 뭔지 모르겠어"></textarea>
      <div class="input-img-row" id="inputImgRow"></div>
      <div class="input-img-add">
        <button class="input-img-btn" onclick="pickInputImage('gallery')">🖼️ 갤러리</button>
        <button class="input-img-btn" onclick="pickInputImage('camera')">📷 카메라</button>
      </div>
      <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
        <span>🧠</span> 개념맵에 추가
      </button>
    </div>
    <div class="focus-bar" id="focusBar">
      <span class="focus-label" id="focusLabel"></span>
      <button class="back-btn" onclick="exitFocus()">← 전체 보기</button>
    </div>
    <div class="node-list" id="nodeList">
      <div class="empty-state"><div class="empty-icon">🗺️</div><div>질문을 입력하면<br>개념 카드가 생성돼요</div></div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mapCanvas"></canvas>
    <div class="canvas-toolbar">
      <button class="ctbtn" id="btnConn" onclick="toggleConnect()">🔗 연결</button>
      <button class="ctbtn" onclick="fitView()">⊙ 맞춤</button>
    </div>
    <div class="legend" id="legend">
      <div class="legend-item"><div class="ldot" style="background:var(--known)"></div>알고 있음</div>
      <div class="legend-item"><div class="ldot" style="background:var(--partial)"></div>어렴풋이</div>

<script>
// ═══ STATE ═══
let subjects=[], nodes=[], edges=[], sessionCount=0;
let editingId=null, connectMode=false, connectFirst=null;
let dragging=null, dragOX=0, dragOY=0;
let panX=0, panY=0, panSX, panSY, panning=false;
let scale=1, highlightId=null;
let deferredInstall=null;
const NR=44;
const COL={known:'#22d3a0',partial:'#fbbf24',unknown:'#f87171'};
const SL={known:'이미 알고 있음',partial:'어렴풋이 앎',unknown:'모르는 부분'};
const SN={calculus:'미분적분학',linalg:'선형대수학',diffEq:'공업수학/미분방정식',
  physics:'일반물리학',em:'전자기학',circuit:'기초회로이론',semicond:'반도체공학',
  quantum:'양자역학',thermo:'열역학/통계역학',signal:'신호및시스템'};

// ═══ PWA ═══
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));
}
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredInstall=e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click',async()=>{
  if(!deferredInstall)return;
  deferredInstall.prompt();
  await deferredInstall.userChoice;
  deferredInstall=null;
  document.getElementById('installBanner').classList.remove('show');
});

// ═══ STORAGE ═══
function save(){
  try{
    localStorage.setItem('cm3_nodes',JSON.stringify(nodes));
    localStorage.setItem('cm3_edges',JSON.stringify(edges));
    localStorage.setItem('cm3_subj',JSON.stringify(subjects));
    localStorage.setItem('cm3_sess',sessionCount);
    localStorage.setItem('cm3_view',JSON.stringify({panX,panY,scale}));
  }catch(e){}
}
function load(){
  try{
    nodes=JSON.parse(localStorage.getItem('cm3_nodes')||'[]');
    edges=JSON.parse(localStorage.getItem('cm3_edges')||'[]');
    subjects=JSON.parse(localStorage.getItem('cm3_subj')||'[]');
    sessionCount=+localStorage.getItem('cm3_sess')||0;
    const v=JSON.parse(localStorage.getItem('cm3_view')||'null');
    if(v){panX=v.panX;panY=v.panY;scale=v.scale;}
  }catch(e){}
}

// ═══ MOBILE SIDEBAR ═══
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══ API KEY ═══
// API key is hardcoded for dev mode

// ═══ ONBOARDING ═══
document.querySelectorAll('.subj-chip').forEach(c=>{
  c.addEventListener('pointerup',()=>{
    c.classList.toggle('sel');
    document.getElementById('obStart').disabled=!document.querySelector('.subj-chip.sel');
  });
});
function startApp(){
  subjects=[...document.querySelectorAll('.subj-chip.sel')].map(c=>c.dataset.id);
  document.getElementById('onboarding').style.display='none';
  save();renderCards();redraw();
  if(nodes.length){document.getElementById('legend').classList.add('show');fitView();}
}
function openOnboarding(){
  document.querySelectorAll('.subj-chip').forEach(c=>c.classList.toggle('sel',subjects.includes(c.dataset.id)));
  document.getElementById('obStart').disabled=!subjects.length;
  document.getElementById('onboarding').style.display='flex';
}

// ═══ ANALYZE ═══
async function analyze(){
  const input=document.getElementById('input').value.trim();
  if(!input)return;
  // 모바일에서 사이드바 열려있으면 닫기
  document.getElementById('sidebar').classList.remove('open');
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;
  btn.innerHTML=`<span class="dots"><span>·</span><span>·</span><span>·</span></span> 분석 중`;
  try{
    let parsed;
    {
      const existCtx=nodes.length?`\n\n기존 노드:\n${nodes.map(n=>`- [${n.id}] "${n.label}" (${n.status})`).join('\n')}` :'';
      const subjectStr=subjects.map(s=>SN[s]||s).join(', ')||'정보없음';
      const imgNote = inputImgs.length ? '\n\n[첨부 이미지 있음] 이미지에서 수식, 필기, 텍스트를 읽어서 질문과 함께 분석하세요. 이미지 내용도 노드 생성에 반영하세요.' : '';
      const prompt=`당신은 이공계 학습 도우미입니다. JSON만 반환하세요. 마크다운 없음.
학생 수강 과목: ${subjectStr}
학생 질문: "${input}"${existCtx}${imgNote}

[수식 포함 기준]
다음 중 하나라도 해당하면 관련 수식을 body에 포함:
- 질문에 숫자+단위, "얼마인가", "구하라", "계산" 포함 → 핵심 관계식 포함 (단, 최종 계산값은 쓰지 말 것. 학생이 직접 풀 수 있도록 수식+주어진 값 대입 직전에서 멈출 것)
- 두 개념의 비교/대조가 필요한 경우 → 각 개념의 수식을 나란히 포함 (예: Jdiff = qDn*dn/dx vs Jdrift = q*n*mu*E)
- 수식 없이는 관계를 설명하기 어려운 경우

[지침]
1. 학생이 직접 언급한 개념/용어만 노드 생성. AI 임의 추가 금지.
2. body: 학생 말 요약 + 위 기준에 해당하면 수식 포함. 수강 과목 기초는 생략.
3. 이미 다른 노드에 쓴 수식은 중복 기재 금지 — 연결선으로 대신함.
4. 기존 노드와 겹치면 existingEdges로만 연결.
5. id: "n_${Date.now()}_숫자" 형식.
{"newNodes":[{"id":"...","label":"학생이 쓴 단어","status":"known|partial|unknown","body":"설명+수식(해당시)"}],"newEdges":[{"from":"id1","to":"id2"}],"existingEdges":[{"from":"기존id","to":"새id"}]}`;
      const res=await fetch('/api/analyze',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt, image: inputImgs[0] || null})
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`);}
      const data=await res.json();
      parsed=safeJSON(data.text.replace(/```json|```/g,'').trim());
    }
    applyResult(parsed);
    document.getElementById('input').value='';
    inputImgs=[];renderInputImgs();
  }catch(e){alert('오류: '+e.message);}
  btn.disabled=false;
  btn.innerHTML=`<span>🧠</span> 개념맵에 추가`;
}

function safeJSON(s){
  try{return JSON.parse(s);}catch(e){
    const stack=[];
    for(const ch of s){if(ch==='['||ch==='{')stack.push(ch);else if((ch===']'||ch==='}')&&stack.length)stack.pop();}
    while(stack.length)s+=stack.pop()==='['?']':'}';
    try{return JSON.parse(s);}catch(e2){return{newNodes:[],newEdges:[],existingEdges:[]};}
  }
}

function applyResult(p){
  sessionCount++;
  const W=canvas.width,H=canvas.height;
  const cx=(W/2-panX)/scale,cy=(H/2-panY)/scale;
  const nn=p.newNodes||[];
  nn.forEach((node,i)=>{
    const angle=(2*Math.PI*i/Math.max(nn.length,1))-Math.PI/2;
    const r=Math.min(W,H)*0.22/scale;
    node.x=cx+(nn.length===1?0:r*Math.cos(angle));
    node.y=cy+(nn.length===1?0:r*Math.sin(angle));
    node.sessionIdx=sessionCount;
    nodes.push(node);
  });
  [...(p.newEdges||[]),...(p.existingEdges||[])].forEach(e=>{
    if(!edges.find(ex=>(ex.from===e.from&&ex.to===e.to)||(ex.from===e.to&&ex.to===e.from)))
      edges.push(e);
  });
  save();renderCards();redraw();fitView();
  document.getElementById('legend').classList.add('show');
}

// ═══ CARDS ═══
function renderCards(){
  const list=document.getElementById('nodeList');
  if(!nodes.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🗺️</div><div>질문을 입력하면<br>개념 카드가 생성돼요</div></div>`;
    return;
  }
  const sessions={};
  nodes.forEach(n=>{(sessions[n.sessionIdx]=sessions[n.sessionIdx]||[]).push(n);});
  list.innerHTML='';
  Object.keys(sessions).sort((a,b)=>b-a).forEach(si=>{
    const lbl=document.createElement('div');
    lbl.className='session-label';lbl.textContent=`질문 ${si}`;list.appendChild(lbl);
    sessions[si].forEach(node=>{
      const card=document.createElement('div');
      card.className='concept-card';card.id=`card-${node.id}`;
      card.innerHTML=`<div class="card-header">
        <div class="sdot ${node.status}"></div>
        <div class="card-title">${node.label}</div>
        <button class="card-edit-btn">✏️</button></div>
        ${node.body?`<div class="card-body">${formatBody(node.body)}</div>`:''}
        ${renderCardImages(node)}
        <span class="tag ${node.status}">${SL[node.status]}</span>`;
      card.querySelector('.card-edit-btn').addEventListener('pointerup',e=>{e.stopPropagation();openEdit(node.id);});
      card.addEventListener('pointerup',()=>pulseNode(node.id));
      list.appendChild(card);
    });
  });
}

function formatBody(text){
  // 줄바꿈 기준으로 분리, 수식 줄은 별도 스타일
  return text.split('\n').map(line=>{
    const t=line.trim();
    if(!t) return '<br>';
    // 수식 줄 판단: = 포함 + 영문자+기호 패턴 or 수식 키워드
    const isFormula = (t.includes('=') && /[A-Za-z]/.test(t) && !/^[가-힣]/.test(t))
      || /^[A-Za-z\(].*[=<>]/.test(t);
    if(isFormula) return `<span class="card-formula">${t}</span>`;
    return `<span style="display:block">${t}</span>`;
  }).join('');
}

function pulseNode(id){
  document.querySelectorAll('.concept-card').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById(`card-${id}`);
  const node=nodes.find(n=>n.id===id);
  const list=document.getElementById('nodeList');
  const bar=document.getElementById('focusBar');
  const lbl=document.getElementById('focusLabel');
  if(card&&node){
    card.classList.add('active');
    list.classList.add('focus-mode');
    bar.classList.add('show');
    lbl.textContent=node.label;
    // mobile: open sidebar
    document.getElementById('sidebar').classList.add('open');
  }
  highlightId=id;redraw();
}
function exitFocus(){
  document.getElementById('nodeList').classList.remove('focus-mode');
  document.getElementById('focusBar').classList.remove('show');
  document.querySelectorAll('.concept-card').forEach(c=>c.classList.remove('active'));
  highlightId=null;redraw();
}

// ═══ CANVAS ═══
const canvas=document.getElementById('mapCanvas');
const ctx=canvas.getContext('2d');

function resize(){
  const w=document.getElementById('canvasWrap');
  canvas.width=w.clientWidth;canvas.height=w.clientHeight;redraw();
}
window.addEventListener('resize',resize);
new ResizeObserver(resize).observe(document.getElementById('canvasWrap'));
setTimeout(resize,50);

function c2w(cx,cy){return{x:(cx-panX)/scale,y:(cy-panY)/scale};}
function hitNode(wx,wy){return nodes.find(n=>Math.hypot(n.x-wx,n.y-wy)<NR+6);}// +6 for fat finger

function redraw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(panX,panY);ctx.scale(scale,scale);
  // edges
  edges.forEach(e=>{
    const f=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);
    if(!f||!t)return;
    const hi=highlightId&&(e.from===highlightId||e.to===highlightId);
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);
    ctx.strokeStyle=hi?'rgba(74,240,196,0.7)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=(hi?2.5:1.5)/scale;ctx.stroke();
  });
  // nodes
  nodes.forEach(node=>{
    const col=COL[node.status]||'#888';
    const hi=node.id===highlightId,cf=node.id===connectFirst;
    const g=ctx.createRadialGradient(node.x,node.y,NR*0.4,node.x,node.y,NR*1.8);
    g.addColorStop(0,col+'28');g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(node.x,node.y,NR*1.8,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(node.x,node.y,NR,0,Math.PI*2);
    ctx.fillStyle='#111318';ctx.fill();
    ctx.strokeStyle=cf?'#ffffff':hi?col:col+'88';
    ctx.lineWidth=(cf||hi?2.5:1.8)/scale;ctx.stroke();
    ctx.fillStyle=col;
    ctx.font=`700 ${11/scale}px 'Noto Sans KR',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const wrapped=wrapLabel(node.label,NR*1.7/scale);
    const lh=15/scale;
    wrapped.forEach((ln,i)=>ctx.fillText(ln,node.x,node.y+(i-(wrapped.length-1)/2)*lh));
  });
  ctx.restore();
}

function wrapLabel(text,maxPx){
  ctx.save();ctx.font=`700 11px 'Noto Sans KR',sans-serif`;
  const lines=[],words=text.split(' ');
  if(words.length===1){
    let line='';
    for(const ch of text){
      if(ctx.measureText(line+ch).width>maxPx&&line){lines.push(line);line=ch;}else line+=ch;
    }
    if(line)lines.push(line);
    ctx.restore();return lines.length?lines:[text];
  }
  let line='';
  words.forEach(w=>{
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxPx&&line){lines.push(line);line=w;}else line=test;
  });
  if(line)lines.push(line);
  ctx.restore();return lines.length?lines:[text];
}

// ═══ POINTER EVENTS (마우스 + 터치 통합) ★ ═══
let tapStartX=0, tapStartY=0, tapTarget=null;
canvas.addEventListener('pointerdown', e=>{
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  const {x,y}=c2w(e.offsetX,e.offsetY);
  const hit=hitNode(x,y);
  tapStartX=e.clientX; tapStartY=e.clientY; tapTarget=hit||null;
  if(connectMode){
    if(hit){
      if(!connectFirst){connectFirst=hit.id;redraw();}
      else if(connectFirst!==hit.id){
        const idx=edges.findIndex(ex=>(ex.from===connectFirst&&ex.to===hit.id)||(ex.from===hit.id&&ex.to===connectFirst));
        if(idx>=0)edges.splice(idx,1);else edges.push({from:connectFirst,to:hit.id});
        connectFirst=null;save();redraw();
      }else{connectFirst=null;redraw();}
    }return;
  }
  if(hit){dragging=hit;dragOX=x-hit.x;dragOY=y-hit.y;}
  else{panning=true;panSX=e.clientX-panX;panSY=e.clientY-panY;}
});

canvas.addEventListener('pointermove', e=>{
  if(!dragging&&!panning)return;
  e.preventDefault();
  const {x,y}=c2w(e.offsetX,e.offsetY);
  if(dragging){dragging.x=x-dragOX;dragging.y=y-dragOY;redraw();return;}
  if(panning){panX=e.clientX-panSX;panY=e.clientY-panSY;redraw();}
});

canvas.addEventListener('pointerup', e=>{
  const moved = Math.hypot(e.clientX-tapStartX, e.clientY-tapStartY);
  if(!connectMode && moved < 8 && tapTarget && !dragging){
    // 탭 = 노드 클릭 → 해당 카드만 표시
    pulseNode(tapTarget.id);
  } else if(!connectMode && moved < 8 && !tapTarget){
    // 빈 곳 탭 → 전체 보기로 복귀
    exitFocus();
  }
  if(dragging)save();
  dragging=null;panning=false;tapTarget=null;
});

canvas.addEventListener('pointercancel', ()=>{dragging=null;panning=false;});

// 더블탭 = 편집
let lastTap=0;
canvas.addEventListener('pointerup', e=>{
  const now=Date.now();
  if(now-lastTap<300){
    const {x,y}=c2w(e.offsetX,e.offsetY);
    const hit=hitNode(x,y);
    if(hit&&!connectMode)openEdit(hit.id);
  }
  lastTap=now;
});

// 핀치 줌 (터치)
let pinchDist=0;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const ratio=d/pinchDist;pinchDist=d;
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-canvas.getBoundingClientRect().left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-canvas.getBoundingClientRect().top;
    panX=mx-(mx-panX)*ratio;panY=my-(my-panY)*ratio;
    scale=Math.max(0.15,Math.min(4,scale*ratio));
    redraw();
  }
},{passive:false});

// 마우스 휠 줌
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.88:1.13;
  panX=e.offsetX-(e.offsetX-panX)*d;panY=e.offsetY-(e.offsetY-panY)*d;
  scale=Math.max(0.15,Math.min(4,scale*d));redraw();
},{passive:false});

// ═══ CONNECT MODE ═══
function toggleConnect(){
  connectMode=!connectMode;connectFirst=null;
  document.getElementById('btnConn').classList.toggle('on',connectMode);
  document.getElementById('hint').style.display=connectMode?'block':'none';
  redraw();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&connectMode){connectFirst=null;redraw();}});

// ═══ FIT VIEW ═══
function fitView(){
  if(!nodes.length)return;
  const W=canvas.width,H=canvas.height;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-NR*2.5,maxX=Math.max(...xs)+NR*2.5;
  const minY=Math.min(...ys)-NR*2.5,maxY=Math.max(...ys)+NR*2.5;
  const dw=maxX-minX||1,dh=maxY-minY||1;
  scale=Math.min(3,Math.max(0.15,Math.min(W/dw,H/dh)*0.85));
  panX=W/2-(minX+dw/2)*scale;panY=H/2-(minY+dh/2)*scale;
  save();redraw();
}

// ═══ EDIT MODAL ═══
function openEdit(id){
  editingId=id;const node=nodes.find(n=>n.id===id);if(!node)return;
  document.getElementById('eLabel').value=node.label;
  document.getElementById('eBody').value=node.body||'';
  document.getElementById('eStatus').value=node.status;
  editImgs=[...(node.images||[])];
  renderEditImgs();
  document.getElementById('editModal').classList.add('open');
}
function closeModal(){document.getElementById('editModal').classList.remove('open');editingId=null;}
function saveNode(){
  const node=nodes.find(n=>n.id===editingId);if(!node)return;
  node.label=document.getElementById('eLabel').value;
  node.body=document.getElementById('eBody').value;
  node.status=document.getElementById('eStatus').value;
  node.images=[...editImgs];
  closeModal();save();renderCards();redraw();
}
function deleteNode(){
  if(!confirm('삭제할까요?'))return;
  nodes=nodes.filter(n=>n.id!==editingId);
  edges=edges.filter(e=>e.from!==editingId&&e.to!==editingId);
  closeModal();save();renderCards();redraw();
}

// ═══ CLEAR ═══
function clearAll(){
  if(!confirm('맵을 전부 초기화할까요?'))return;
  nodes=[];edges=[];sessionCount=0;panX=0;panY=0;scale=1;highlightId=null;
  save();renderCards();redraw();
  document.getElementById('legend').classList.remove('show');
}

document.getElementById('input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))analyze();
});


// ═══ IMAGE HANDLING ═══
let editImgs = []; // base64 for card edit
let inputImgs = []; // base64 for question input

function pickImage(source) {
  const picker = source === 'camera'
    ? document.getElementById('imgCameraPicker')
    : document.getElementById('imgFilePicker');
  picker.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      editImgs.push(ev.target.result);
      renderEditImgs();
    };
    reader.readAsDataURL(file);
    picker.value = '';
  };
  picker.click();
}

function pickInputImage(source) {
  const picker = source === 'camera'
    ? document.getElementById('inputImgCameraPicker')
    : document.getElementById('inputImgFilePicker');
  picker.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // 질문 입력란은 이미지 1장만 (분석용)
      inputImgs = [ev.target.result];
      renderInputImgs();
    };
    reader.readAsDataURL(file);
    picker.value = '';
  };
  picker.click();
}

function renderInputImgs() {
  const row = document.getElementById('inputImgRow');
  row.innerHTML = '';
  inputImgs.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'input-img-thumb';
    wrap.innerHTML = `<img src="${src}" onclick="openLightbox('${src}')">
      <button class="del-img" onclick="inputImgs=[];renderInputImgs()">✕</button>`;
    row.appendChild(wrap);
  });
  if (inputImgs.length > 0) {
    const note = document.createElement('span');
    note.className = 'analyzing-img';
    note.textContent = '📎 이미지 첨부됨 — AI가 내용을 읽어 분석해요';
    row.appendChild(note);
  }
}

function renderEditImgs() {
  const row = document.getElementById('editImgRow');
  row.innerHTML = '';
  editImgs.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-thumb';
    wrap.innerHTML = `<img src="${src}" onclick="openLightbox('${src}')">
      <button class="del-img" onclick="removeImg(${i})">✕</button>`;
    row.appendChild(wrap);
  });
  // add button
  if (editImgs.length < 4) {
    const add = document.createElement('button');
    add.className = 'add-img-btn';
    add.textContent = '+';
    add.onclick = () => pickImage('gallery');
    row.appendChild(add);
  }
}

function removeImg(i) {
  editImgs.splice(i, 1);
  renderEditImgs();
}

function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.getElementById('lightbox').addEventListener('pointerup', (e) => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

function renderCardImages(node) {
  if (!node.images || !node.images.length) return '';
  return `<div class="card-images">${node.images.map(src =>
    `<img class="card-img" src="${src}" onclick="event.stopPropagation();openLightbox('${src}')">`
  ).join('')}</div>`;
}

// ═══ INIT ═══
load();
if(subjects.length){
  document.querySelectorAll('.subj-chip').forEach(c=>c.classList.toggle('sel',subjects.includes(c.dataset.id)));
  document.getElementById('onboarding').style.display='none';
  renderCards();
  if(nodes.length){document.getElementById('legend').classList.add('show');setTimeout(fitView,100);}
}
</script>
