<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="개념맵">
<meta name="theme-color" content="#0a0c10">
<title>개념맵 — 하이브리드 지식망</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#1a1d24;
  --border:rgba(255,255,255,0.08);
  --text:#e2e8f0;--muted:#64748b;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  padding-top:var(--safe-top);}

/* ══ ONBOARDING ══ */
#onboarding{position:fixed;inset:0;background:rgba(10,12,16,0.98);z-index:3000;
  display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.ob-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:32px 26px;max-width:520px;width:100%;}
.ob-box h1{font-size:21px;font-weight:700;margin-bottom:8px;}
.ob-box h1 em{color:var(--accent, #4af0c4);font-style:normal;}
.ob-subtitle{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:24px;}
.ob-section{margin-bottom:18px;}
.ob-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:8px;}
.ob-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;line-height:1.7;padding:12px 14px;resize:none;height:140px;outline:none;
  transition:border-color .2s;}
.ob-textarea:focus{border-color:rgba(74,240,196,0.4);}
.ob-textarea::placeholder{color:var(--muted);}
.ob-img-row{display:flex;gap:8px;margin-top:8px;}
.ob-img-btn{flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;color:var(--muted);font-size:12.5px;padding:10px 6px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:center;}
.ob-img-btn:active{border-color:rgba(74,240,196,0.5);color:#4af0c4;}
.ob-attached{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.ob-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);}
.ob-thumb img{width:100%;height:100%;object-fit:cover;}
.ob-thumb .rm{position:absolute;top:0;right:0;background:rgba(0,0,0,.7);border:none;
  color:#fff;width:16px;height:16px;font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:0 0 0 5px;}
.ob-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);
  font-size:12px;}
.ob-divider::before,.ob-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.ob-existing{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:12px;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:border-color .15s;}
.ob-existing:active{border-color:rgba(74,240,196,0.4);}
.ob-start{width:100%;background:#4af0c4;color:#0a0c10;border:none;border-radius:10px;
  padding:14px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;margin-top:4px;transition:opacity .2s;}
.ob-start:disabled{opacity:.3;cursor:not-allowed;}
.ob-status{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;min-height:18px;}

/* ══ COLOR ASSIGN MODAL ══ */
#colorModal{position:fixed;inset:0;background:rgba(10,12,16,.85);z-index:2500;
  display:none;align-items:flex-end;justify-content:center;}
#colorModal.open{display:flex;}
.color-box{background:var(--surface);border:1px solid var(--border);
  border-radius:18px 18px 0 0;padding:22px 20px calc(18px + var(--safe-bot));
  width:100%;max-width:460px;}
.color-box h3{font-size:14px;font-weight:700;margin-bottom:14px;}
.subj-color-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.subj-color-row{display:flex;align-items:center;gap:10px;}
.subj-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.subj-color-name{flex:1;font-size:13px;}
.subj-color-input{width:36px;height:28px;border:none;border-radius:6px;cursor:pointer;
  background:none;padding:0;}
.color-close{width:100%;background:var(--surface2);border:none;border-radius:9px;
  padding:11px;color:var(--muted);font-size:13px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;}

/* ══ TOP BAR ══ */
#topBar{position:fixed;top:var(--safe-top);left:0;right:0;z-index:100;
  display:flex;align-items:center;padding:10px 14px;gap:8px;pointer-events:none;}
#topBar>*{pointer-events:all;}
.logo{font-family:'Space Mono',monospace;font-size:12px;color:#4af0c4;
  background:rgba(10,12,16,0.8);border-radius:8px;padding:6px 10px;
  backdrop-filter:blur(8px);}
.logo span{color:var(--muted);}
.tsep{flex:1;}
.icon-btn{background:rgba(17,19,24,0.85);border:1px solid var(--border);
  border-radius:10px;color:var(--muted);font-size:15px;
  width:38px;height:38px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;backdrop-filter:blur(8px);transition:all .2s;flex-shrink:0;}
.icon-btn:active,.icon-btn.active{border-color:#4af0c4;color:#4af0c4;}

/* ══ MAP ══ */
#mapWrap{position:fixed;inset:0;z-index:1;transition:left .28s cubic-bezier(.4,0,.2,1);}
canvas#mapCanvas{width:100%;height:100%;touch-action:none;display:block;}
body.sb-open #mapWrap{left:300px;}
@media(max-width:699px){body.sb-open #mapWrap{left:0;}}

/* ══ LONG PRESS INDICATOR ══ */
#lpRing{position:fixed;pointer-events:none;z-index:200;display:none;}
#lpRing svg{animation:lpSpin .8s linear;}
@keyframes lpSpin{from{stroke-dashoffset:113}to{stroke-dashoffset:0}}

/* ══ CONNECT HINT ══ */
#connectHint{position:fixed;top:calc(58px + var(--safe-top));left:50%;
  transform:translateX(-50%);background:rgba(17,19,24,0.9);border:1px solid var(--border);
  border-radius:8px;padding:6px 14px;font-size:11.5px;color:#4af0c4;
  z-index:150;pointer-events:none;white-space:nowrap;display:none;}
#connectHint.show{display:block;}

/* ══ SIDEBAR ══ */
#sbOverlay{position:fixed;inset:0;z-index:299;display:none;}
#sbOverlay.show{display:block;}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:300px;
  background:var(--surface);border-right:1px solid var(--border);
  z-index:300;display:flex;flex-direction:column;padding-top:var(--safe-top);
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
#sidebar.open{transform:translateX(0);}
@media(min-width:700px){#sidebar{z-index:150;}}
@media(max-width:400px){#sidebar{width:88vw;}}
.sb-hdr{display:flex;align-items:center;padding:13px 14px 10px;
  border-bottom:1px solid var(--border);gap:10px;}
.sb-hdr h2{font-size:13px;font-weight:700;flex:1;}
.sb-hdr-btns{display:flex;gap:6px;}
.sb-mini-btn{background:none;border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-size:11px;padding:4px 9px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.sb-mini-btn:active{border-color:#4af0c4;color:#4af0c4;}
.sb-close{background:none;border:none;color:var(--muted);font-size:20px;
  cursor:pointer;line-height:1;padding:2px 4px;}
#histList{flex:1;overflow-y:auto;padding:10px 12px;
  display:flex;flex-direction:column;gap:6px;}
#histList::-webkit-scrollbar{width:3px;}
#histList::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.hist-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;color:var(--muted);font-size:13px;text-align:center;gap:8px;padding:40px 20px;}
.hist-item{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;transition:border-color .15s;}
.hist-item.hi{border-color:#4af0c4;}
.hist-hdr{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 6px;cursor:pointer;}
.hist-hdr:active{background:rgba(255,255,255,0.03);}
.hist-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  padding-top:2px;flex-shrink:0;}
.hist-qtxt{font-size:12.5px;line-height:1.5;color:var(--text);flex:1;}
.hist-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 5px;}
.hist-tag{font-size:10px;padding:2px 8px;border-radius:6px;
  font-family:'Space Mono',monospace;cursor:pointer;
  border:1px solid rgba(74,240,196,0.25);color:#4af0c4;background:rgba(74,240,196,0.06);}
.hist-tag.custom{border-color:rgba(251,191,36,0.3);color:#fbbf24;background:rgba(251,191,36,0.06);}
.hist-tag:active{opacity:.7;}
.hist-chips{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px;}
.hist-chip{font-size:10px;padding:2px 8px;border-radius:99px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.15);color:var(--muted);background:rgba(255,255,255,0.04);}
.hist-chip:active{opacity:.7;}
.hist-exp{display:none;padding:10px 12px 12px;border-top:1px solid var(--border);
  font-size:12px;color:#94a3b8;line-height:1.75;}
.hist-exp.show{display:block;}
.hist-formula{display:block;font-family:'Space Mono',monospace;font-size:11px;
  color:#e2e8f0;margin:6px 0;line-height:1.6;}

/* ══ CONCEPT CARD ══ */
#conceptCard{position:fixed;left:0;right:0;bottom:0;z-index:200;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,.24,1.02);
  pointer-events:none;}
#conceptCard.show{transform:translateY(0);pointer-events:all;}
.cc-inner{background:rgba(17,19,24,0.97);border-top:1px solid var(--border);
  backdrop-filter:blur(16px);max-height:62vh;display:flex;flex-direction:column;}
.cc-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;
  margin:10px auto 0;}
.cc-head{display:flex;align-items:flex-start;gap:10px;padding:10px 16px 8px;}
.cc-subj-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.cc-title-wrap{flex:1;}
.cc-id{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:2px;}
.cc-title{font-size:15px;font-weight:700;line-height:1.3;}
.cc-head-btns{display:flex;gap:6px;flex-shrink:0;}
.cc-btn{background:none;border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-size:11px;padding:5px 10px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.cc-btn:active{border-color:#4af0c4;color:#4af0c4;}
.cc-scroll{flex:1;overflow-y:auto;padding:0 16px 16px;}
.cc-scroll::-webkit-scrollbar{width:3px;}
.cc-body{font-size:12.5px;color:#94a3b8;line-height:1.75;}
.cc-body .section-hdr{display:block;font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:.08em;text-transform:uppercase;
  margin:12px 0 5px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.cc-body .katex-display{margin:8px 0;}
.cc-body .formula-line{display:block;font-family:'Space Mono',monospace;font-size:11.5px;
  color:#e2e8f0;margin:5px 0;line-height:1.65;}
.cc-insight{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);
  border-radius:8px;padding:10px 12px;margin-top:12px;}
.cc-insight-hdr{font-size:10px;font-weight:700;color:#fbbf24;
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.cc-insight-body{font-size:12px;color:#d4a847;line-height:1.7;}
.cc-imgs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.cc-img{width:72px;height:72px;border-radius:8px;object-fit:cover;
  border:1px solid var(--border);cursor:pointer;}
.cc-wiki-img{display:block;width:100%;max-height:180px;object-fit:contain;
  border-radius:8px;margin-top:10px;background:var(--surface2);cursor:pointer;}
.cc-wiki-cap{font-size:10px;color:var(--muted);margin-top:4px;text-align:center;}
/* Append mode */
.cc-append-area{padding:10px 16px;border-top:1px solid var(--border);}
.cc-append-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:12.5px;line-height:1.6;padding:9px 12px;resize:none;height:70px;outline:none;}
.cc-append-textarea:focus{border-color:rgba(74,240,196,0.4);}
.cc-append-row{display:flex;gap:7px;margin-top:7px;}
.cc-append-btn{flex:1;background:#4af0c4;color:#0a0c10;border:none;border-radius:8px;
  padding:9px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.cc-append-cancel{background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:9px 14px;font-size:13px;color:var(--muted);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ══ BOTTOM INPUT ══ */
#inputBar{position:fixed;left:0;right:0;bottom:0;z-index:210;
  background:rgba(17,19,24,0.96);border-top:1px solid var(--border);
  backdrop-filter:blur(12px);padding:10px 12px calc(10px + var(--safe-bot));}
.inp-row{display:flex;align-items:flex-end;gap:8px;}
.inp-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:border-color .2s;}
.inp-wrap:focus-within{border-color:rgba(74,240,196,0.4);}
#questionInput{background:transparent;border:none;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-size:13.5px;line-height:1.6;
  padding:10px 12px 6px;resize:none;height:44px;max-height:120px;outline:none;
  display:block;width:100%;}
#questionInput::placeholder{color:var(--muted);}
.inp-bot{display:flex;align-items:center;padding:4px 8px 6px;gap:6px;}
.attach-btn{background:none;border:none;color:var(--muted);font-size:16px;
  cursor:pointer;padding:2px 4px;}
.attach-btn:active{color:#4af0c4;}
#attachWrap{display:flex;gap:4px;}
.att-thumb{position:relative;width:34px;height:34px;border-radius:6px;overflow:hidden;
  border:1px solid var(--border);}
.att-thumb img{width:100%;height:100%;object-fit:cover;}
.att-thumb .rm{position:absolute;top:0;right:0;background:rgba(0,0,0,.7);border:none;
  color:#fff;width:14px;height:14px;font-size:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.inp-sep{flex:1;}
#sendBtn{background:#4af0c4;border:none;border-radius:10px;color:#0a0c10;
  font-size:16px;width:44px;height:44px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:opacity .2s;}
#sendBtn:disabled{opacity:.35;cursor:not-allowed;}
#sendBtn.loading{background:var(--surface2);border:1px solid var(--border);}

/* ══ LIGHTBOX ══ */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;
  display:none;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;object-fit:contain;}
.lb-close{position:absolute;top:16px;right:16px;background:none;border:none;
  color:#fff;font-size:28px;cursor:pointer;}

/* ══ DOTS ══ */
.dots span{display:inline-block;animation:blink 1.2s infinite;font-size:14px;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

input[type=file]{display:none;}
</style>
</head>
<body>

<!-- ══ ONBOARDING ══ -->
<div id="onboarding">
  <div class="ob-box">
    <h1>나만의 <em>하이브리드 지식망</em></h1>
    <p class="ob-subtitle">교재 목차를 뼈대로 세우고, 질문이 쌓일수록 지식이 가지처럼 뻗어나가요.<br>여러 전공 교재를 융합할 수도 있어요.</p>

    <div class="ob-section">
      <div class="ob-label">공부 중인 교재의 단원 목록을 입력해주세요</div>
      <textarea class="ob-textarea" id="obTextInput"
        placeholder="예) 1. 결정구조&#10;1.1 원자 결합&#10;1.2 반도체 도핑&#10;2. 에너지 대역&#10;2.1 페르미-디락 분포&#10;...&#10;&#10;또는 목차 사진을 찍어 올려도 돼요"></textarea>
      <div class="ob-img-row">
        <button class="ob-img-btn" onclick="obPickImg('gallery')">🖼️ 갤러리에서 선택</button>
        <button class="ob-img-btn" onclick="obPickImg('camera')">📷 목차 사진 찍기</button>
      </div>
      <div class="ob-attached" id="obAttached"></div>
    </div>

    <div class="ob-divider">또는</div>
    <div class="ob-existing" onclick="skipOnboarding()">
      <span>📂</span>
      <span>기존 지식망 이어서 사용하기</span>
      <span style="color:var(--muted);margin-left:auto">→</span>
    </div>

    <button class="ob-start" id="obStart" onclick="startWithTextbook()">뼈대 만들기 →</button>
    <div class="ob-status" id="obStatus"></div>
  </div>
</div>

<!-- ══ COLOR MODAL ══ -->
<div id="colorModal">
  <div class="color-box">
    <h3>🎨 전공별 색상 설정</h3>
    <div class="subj-color-list" id="subjColorList"></div>
    <button class="color-close" onclick="closeColorModal()">닫기</button>
  </div>
</div>

<!-- ══ MAP ══ -->
<div id="mapWrap"><canvas id="mapCanvas"></canvas></div>

<!-- ══ LONG PRESS RING ══ -->
<div id="lpRing">
  <svg width="52" height="52" viewBox="0 0 52 52">
    <circle cx="26" cy="26" r="18" fill="none" stroke="rgba(74,240,196,0.3)" stroke-width="3"/>
    <circle cx="26" cy="26" r="18" fill="none" stroke="#4af0c4" stroke-width="3"
      stroke-dasharray="113" stroke-dashoffset="113" stroke-linecap="round"
      transform="rotate(-90 26 26)" id="lpArc"/>
  </svg>
</div>

<!-- ══ TOP BAR ══ -->
<div id="topBar">
  <div class="logo">concept<span>map</span></div>
  <div class="tsep"></div>
  <button class="icon-btn" id="btnHistory" onclick="toggleSidebar()">☰</button>
  <button class="icon-btn" id="btnConnect" onclick="toggleConnect()">🔗</button>
  <button class="icon-btn" onclick="fitView()">⊙</button>
  <button class="icon-btn" onclick="openColorModal()">🎨</button>
  <button class="icon-btn" onclick="addTextbook()">＋교재</button>
  <button class="icon-btn" style="color:#f87171" onclick="confirmClear()">✕</button>
</div>

<!-- ══ CONNECT HINT ══ -->
<div id="connectHint">노드 탭 → 다른 노드 탭으로 연결/해제 | ESC 취소</div>

<!-- ══ SIDEBAR ══ -->
<div id="sbOverlay" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div class="sb-hdr">
    <h2>질문 히스토리</h2>
    <div class="sb-hdr-btns">
      <button class="sb-mini-btn" onclick="openAddTextbook()">＋교재 추가</button>
    </div>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <div id="histList">
    <div class="hist-empty" id="histEmpty">
      <div style="font-size:28px;opacity:.3">💬</div>
      <div>질문이 쌓이면<br>여기에 기록돼요</div>
    </div>

// ══════════════════════════════════════════

JSON만 반환하세요. 마크다운 금지.

목차 텍스트:

${txt||'(이미지 참조)'}

규칙:

  try{

// ══════════════════════════════════════════
// CREATE TEXTBOOK NODES (계층적 배치)
// ══════════════════════════════════════════
function createTextbookNodes(tb, chapters){
  const W=canvas.width||window.innerWidth;
  const H=canvas.height||window.innerHeight;
  const cx=(W/2-panX)/scale, cy=(H/2-panY)/scale;

  // level 계산 (0=대단원, 1=중단원, 2=소단원)
  chapters.forEach(ch=>{
    const depth = ch.id.split('.').length - 1;
    const existing = nodes.find(n=>n.id===ch.id);
    if(existing) return; // 이미 있으면 스킵

    // 계층별 반경
    const r = [0, 220, 380, 520][depth] || 520;
    const siblings = chapters.filter(c=>c.id.split('.').length-1===depth);
    const idx = siblings.indexOf(ch);
    const total = siblings.length;
    const angle = (2*Math.PI*idx/Math.max(total,1)) - Math.PI/2;

    nodes.push({
      id: ch.id,
      label: ch.label,
      subjId: tb.id,
      level: depth,
      body: '',
      insight: '',
      images: [],
      x: cx + r*Math.cos(angle)/scale,
      y: cy + r*Math.sin(angle)/scale,
      sessionIdx: 0,
      isCustom: false
    });
  });

  // 계층 간 엣지 자동 연결
  chapters.forEach(ch=>{
    const parts = ch.id.split('.');
    if(parts.length>1){
      const parentId = parts.slice(0,-1).join('.');
      if(chapters.find(c=>c.id===parentId)){
        if(!edges.find(e=>(e.from===parentId&&e.to===ch.id)||(e.from===ch.id&&e.to===parentId)))
          edges.push({from:parentId, to:ch.id});
      }
    }
  });
}

async function analyze(){
  const input=document.getElementById('questionInput').value.trim();
  if(!input) return;
  const btn=document.getElementById('sendBtn');
  btn.disabled=true; btn.classList.add('loading');
  btn.innerHTML='<span class="dots"><span>·</span><span>·</span><span>·</span></span>';

  // 교재 목차 컨텍스트
  const tbContext = textbooks.map(tb=>
    `[${tb.name}]\n` + Object.entries(tb.chapters).map(([k,v])=>`${k} ${v}`).join('\n')
  ).join('\n\n');

  const existingNodes = nodes.map(n=>`${n.id} "${n.label}" (level:${n.level}${n.isCustom?' CUSTOM':''})`).join('\n');

  const prompt=`당신은 이공계 교수입니다. JSON만 반환. 마크다운 금지.

[등록된 교재 목차]
${tbContext||'없음'}

[현재 맵의 노드들]
${existingNodes||'없음'}

[작업 원칙]

[노드 레이블 원칙]

[단원 카드 body 형식]
[정의]

[핵심 수식]
$정확한_LaTeX_수식$ (교과서 원형, 근사 없이)
$두번째_수식$

[변수 설명]

[물리적 의미]

[수식 기호 표준] I_s, V_T=kT/q, E_F, V_bi, W∝√(V_bi+V_R), C_j=C_j0/√(1+V_R/V_bi)

[누적 업데이트] 기존 노드에 인사이트 추가가 필요하면:

JSON:
{

function safeJSON(s){
  try{return JSON.parse(s);}catch(e){
    const stack=[];
    for(const ch of s){if(ch==='['||ch==='{')stack.push(ch);else if((ch===']'||ch==='}')&&stack.length)stack.pop();}
    while(stack.length)s+=stack.pop()==='['?']':'}';
    try{return JSON.parse(s);}catch(e2){return{chapters:[],chapterDetails:[],customNodes:[],edges:[],explanation:''};}
  }
}

function applyResult(p, questionText){
  sessionCount++;
  const W=canvas.width, H=canvas.height;
  const cx=(W/2-panX)/scale, cy=(H/2-panY)/scale;
  const sessionNodeIds=[];

  // 1. 교재 단원 노드 생성/업데이트
  (p.chapterDetails||[]).forEach(d=>{
    const existing=nodes.find(n=>n.id===d.id);
    if(existing){
      if(!existing.body) existing.body=d.body||'';
      existing.sessionIdx=sessionCount;
    } else {
      // 어느 교재 단원인지 찾기
      const tb=textbooks.find(t=>t.chapters&&t.chapters[d.id]);
      const depth=d.id.split('.').length-1;
      const r=[160,300,420][depth]||420;
      const angle=Math.random()*2*Math.PI;
      nodes.push({
        id:d.id, label:d.label||tb?.chapters[d.id]||d.id,
        subjId:tb?.id||'', level:depth,
        body:d.body||'', insight:'', images:[],
        x:cx+r*Math.cos(angle)/scale,
        y:cy+r*Math.sin(angle)/scale,
        sessionIdx:sessionCount, isCustom:false
      });
    }
    sessionNodeIds.push(d.id);
  });

  // 2. 커스텀 노드 생성 (연습문제, 논문, 심화)
  (p.customNodes||[]).forEach(cn=>{
    if(nodes.find(n=>n.id===cn.id)) return;
    const parent=nodes.find(n=>n.id===cn.parentId);
    const offset=80+Math.random()*60;
    const angle=Math.random()*2*Math.PI;
    const tb=textbooks[0];
    nodes.push({
      id:cn.id, label:cn.label||cn.id,
      subjId:tb?.id||'', level:(cn.level||2)+1,
      body:cn.body||'', insight:'', images:[],
      x:(parent?parent.x:cx)+(offset*Math.cos(angle)),
      y:(parent?parent.y:cy)+(offset*Math.sin(angle)),
      sessionIdx:sessionCount, isCustom:true
    });
    if(cn.parentId) edges.push({from:cn.parentId,to:cn.id});
    sessionNodeIds.push(cn.id);
  });

  // 3. 인사이트 누적 (Append)
  (p.updateInsights||[]).forEach(u=>{
    const n=nodes.find(x=>x.id===u.id);
    if(n && u.append){
      n.insight=(n.insight?n.insight+'\n\n':'')+u.append;
      sessionNodeIds.push(u.id);
    }
  });

  // 4. 엣지
  (p.edges||[]).forEach(e=>{
    if(!edges.find(ex=>(ex.from===e.from&&ex.to===e.to)||(ex.from===e.to&&ex.to===e.from)))
      edges.push(e);
  });

  // 5. 세션 저장
  sessionData[sessionCount]={
    question:questionText,
    answer:p.explanation||'',
    chapters:p.chapters||[],
    customNodes:(p.customNodes||[]).map(c=>c.id),
    nodeIds:sessionNodeIds
  };

  save(); redraw(); fitView();
  if(document.getElementById('sidebar').classList.contains('open')) renderHistory();
}

// ══════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════
const canvas=document.getElementById('mapCanvas');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=document.getElementById('mapWrap').clientWidth;
  canvas.height=window.innerHeight;
  redraw();
}
window.addEventListener('resize',resize);
new ResizeObserver(resize).observe(document.getElementById('mapWrap'));
setTimeout(resize,50);

function c2w(cx,cy){return{x:(cx-panX)/scale,y:(cy-panY)/scale};}
function hitNode(wx,wy){return nodes.find(n=>Math.hypot(n.x-wx,n.y-wy)<NR+8);}

function nodeColor(node){
  if(node.isCustom) return '#fbbf24'; // 커스텀 노드는 노란색
  return getSubjColor(node.subjId);
}

function redraw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(panX,panY);ctx.scale(scale,scale);

  const hiIds=focusSessionIdx?(sessionData[focusSessionIdx]?.nodeIds||[]):[];

  // 엣지
  edges.forEach(e=>{
    const f=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);
    if(!f||!t)return;
    const hiNode=focusNodeId&&(e.from===focusNodeId||e.to===focusNodeId);
    const hiSess=hiIds.length&&hiIds.includes(e.from)&&hiIds.includes(e.to);
    const isCross=e.isCross;

    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);
    if(hiNode){
      ctx.strokeStyle='rgba(74,240,196,0.9)';ctx.lineWidth=3/scale;
    }else if(hiSess){
      ctx.strokeStyle='rgba(74,240,196,0.6)';ctx.lineWidth=2.5/scale;
    }else if(isCross){
      ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5/scale;
      ctx.setLineDash([4/scale,4/scale]);
    }else{
      ctx.strokeStyle='rgba(148,163,184,0.25)';ctx.lineWidth=1.8/scale;
    }
    ctx.stroke();ctx.setLineDash([]);
  });

  // 노드
  nodes.forEach(node=>{
    const col=nodeColor(node);
    const isFocused=node.id===focusNodeId;
    const isHi=hiIds.includes(node.id);
    const isLp=lpActive&&pdTarget&&pdTarget.id===node.id;

    // glow
    const g=ctx.createRadialGradient(node.x,node.y,NR*0.3,node.x,node.y,NR*1.8);
    g.addColorStop(0,col+(isFocused||isHi?'30':'15'));g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(node.x,node.y,NR*1.8,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();

    // fill
    ctx.beginPath();ctx.arc(node.x,node.y,NR,0,Math.PI*2);
    ctx.fillStyle='#0d1117';ctx.fill();

    // stroke
    ctx.strokeStyle= isFocused ? col :
                     isLp ? '#ffffff' :
                     isHi ? col :
                     connectFirst===node.id ? '#ffffff' :
                     col+'55';
    ctx.lineWidth=(isFocused||isLp?3:isHi?2.2:1.6)/scale;
    ctx.stroke();

    // 커스텀 노드 별 표시
    if(node.isCustom){
      ctx.fillStyle=col;
      ctx.font=`${10/scale}px 'Space Mono',monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('★', node.x, node.y-NR*0.55);
    }

    // label
    ctx.fillStyle=isFocused||isHi?col:'rgba(226,232,240,0.85)';
    ctx.font=`600 ${11/scale}px 'Noto Sans KR',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const wrapped=wrapLabel(node.label,NR*1.65/scale);
    const lh=14/scale;
    const startY=node.isCustom?node.y+(lh*0.3):node.y;
    wrapped.forEach((ln,i)=>ctx.fillText(ln,node.x,startY+(i-(wrapped.length-1)/2)*lh));

    // 인사이트 있으면 💡 표시
    if(node.insight){
      ctx.font=`${9/scale}px sans-serif`;
      ctx.fillText('💡',node.x+NR*0.7,node.y-NR*0.7);
    }
  });

  ctx.restore();
}

function wrapLabel(text,maxPx){
  ctx.save();ctx.font=`600 11px 'Noto Sans KR',sans-serif`;
  const lines=[],words=text.replace(/_/g,' ').split(' ');
  if(words.length===1){
    let line='';
    for(const ch of text.replace(/_/g,' ')){
      if(ctx.measureText(line+ch).width>maxPx&&line){lines.push(line);line=ch;}else line+=ch;
    }
    if(line)lines.push(line);
    ctx.restore();return lines.length?lines:[text];
  }
  let line='';
  words.forEach(w=>{
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxPx&&line){lines.push(line);line=w;}else line=t;
  });
  if(line)lines.push(line);
  ctx.restore();return lines.length?lines:[text];
}

// LONG PRESS INDICATOR
// ══════════════════════════════════════════
function showLpRing(cx,cy){
  const ring=document.getElementById('lpRing');
  ring.style.display='block';
  ring.style.left=(cx-26)+'px';ring.style.top=(cy-26)+'px';
  const arc=document.getElementById('lpArc');
  arc.style.animation='none';
  void arc.offsetWidth;
  arc.style.animation=`lpSpin ${LONG_PRESS_MS}ms linear forwards`;
}
function hideLpRing(){ document.getElementById('lpRing').style.display='none'; }

// ══════════════════════════════════════════
// POINTER EVENTS (Long Press to Drag)
// ══════════════════════════════════════════
canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();canvas.setPointerCapture(e.pointerId);
  const{x,y}=c2w(e.offsetX,e.offsetY);
  const hit=hitNode(x,y);
  pdX=e.clientX;pdY=e.clientY;pdTarget=hit||null;didDrag=false;lpActive=false;

  if(connectMode){
    if(hit){
      if(!connectFirst){connectFirst=hit.id;redraw();}
      else if(connectFirst!==hit.id){
        const idx=edges.findIndex(ex=>(ex.from===connectFirst&&ex.to===hit.id)||(ex.from===hit.id&&ex.to===connectFirst));
        if(idx>=0)edges.splice(idx,1);else edges.push({from:connectFirst,to:hit.id});
        connectFirst=null;save();redraw();
      }else{connectFirst=null;redraw();}
    }return;
  }

  if(hit){
    // 롱프레스 타이머 시작
    showLpRing(e.clientX,e.clientY);
    lpTimer=setTimeout(()=>{
      lpActive=true;
      dragging=hit;dragOX=x-hit.x;dragOY=y-hit.y;
      hideLpRing();redraw();
    },LONG_PRESS_MS);
  }else{
    panning=true;panSX=e.clientX-panX;panSY=e.clientY-panY;
  }
});

canvas.addEventListener('pointermove',e=>{
  const moved=Math.hypot(e.clientX-pdX,e.clientY-pdY);
  if(moved>TAP_THRESHOLD&&lpTimer&&!lpActive){
    clearTimeout(lpTimer);lpTimer=null;hideLpRing();
    // 드래그 전에 이동했으면 패닝으로 전환
    if(pdTarget){dragging=null;panning=true;panSX=e.clientX-panX;panSY=e.clientY-panY;}
  }
  if(moved>TAP_THRESHOLD) didDrag=true;

  if(dragging&&lpActive){
    const{x,y}=c2w(e.offsetX,e.offsetY);
    dragging.x=x-dragOX;dragging.y=y-dragOY;redraw();
  }else if(panning){
    panX=e.clientX-panSX;panY=e.clientY-panSY;redraw();
  }
});

canvas.addEventListener('pointerup',e=>{
  clearTimeout(lpTimer);lpTimer=null;hideLpRing();
  const wasTap=Math.hypot(e.clientX-pdX,e.clientY-pdY)<TAP_THRESHOLD&&!didDrag&&!lpActive;

  if(!connectMode&&wasTap){
    if(pdTarget){
      if(focusNodeId===pdTarget.id) closeConceptCard();
      else{if(window.innerWidth<700)closeSidebar();openConceptCard(pdTarget.id);}
    }else{
      closeConceptCard();focusSessionIdx=null;redraw();
    }
  }
  if(dragging&&lpActive) save();
  dragging=null;panning=false;didDrag=false;lpActive=false;pdTarget=null;
});

canvas.addEventListener('pointercancel',()=>{
  clearTimeout(lpTimer);lpTimer=null;hideLpRing();
  dragging=null;panning=false;didDrag=false;lpActive=false;
});

// 더블탭 → 편집 모달 (추후 확장용)
let lastTap=0;
canvas.addEventListener('pointerup',e=>{
  const now=Date.now();
  if(now-lastTap<300&&pdTarget){
    // 더블탭 → 인사이트 추가 바로 열기
    openConceptCard(pdTarget.id);
    setTimeout(()=>toggleAppendMode(),150);
  }
  lastTap=now;
});

// 핀치 줌
let pinchDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    clearTimeout(lpTimer);lpTimer=null;hideLpRing();
    pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const r=d/pinchDist;pinchDist=d;
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    panX=mx-(mx-panX)*r;panY=my-(my-panY)*r;
    scale=Math.max(0.15,Math.min(4,scale*r));redraw();
  }
},{passive:false});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.88:1.13;
  panX=e.offsetX-(e.offsetX-panX)*d;panY=e.offsetY-(e.offsetY-panY)*d;
  scale=Math.max(0.15,Math.min(4,scale*d));redraw();
},{passive:false});

// CONCEPT CARD
// ══════════════════════════════════════════
function renderLatex(text){
  if(!text) return '';
  return text.split('\n').map(line=>{
    const t=line.trim();
    if(!t) return '<br>';
    // 섹션 헤더
    if(/^\[(정의|핵심 수식|변수 설명|물리적 의미|풀이|해설)\]/.test(t))
      return`<span class="section-hdr">${t.replace(/^\[|\]$/g,'')}</span>`;
    // LaTeX 수식 ($...$)
    if(t.startsWith('$')&&t.endsWith('$')){
      const expr=t.slice(1,-1);
      try{
        const el=document.createElement('span');
        katex.render(expr,el,{throwOnError:false,displayMode:true});
        return el.outerHTML;
      }catch{return`<span class="formula-line">${t}</span>`;}
    }
    // 인라인 수식 감지
    const isFormula=(t.includes('=')&&/[A-Za-z_]/.test(t)&&!/^[가-힣]{2}/.test(t))
      ||/^[A-Za-z_\(].*[=<>≈]/.test(t);
    if(isFormula&&typeof katex!=='undefined'){
      try{
        const el=document.createElement('span');
        katex.render(t.replace(/\$/g,''),el,{throwOnError:false,displayMode:false});
        return`<span style="display:block;margin:4px 0">${el.outerHTML}</span>`;
      }catch{return`<span class="formula-line">${t}</span>`;}
    }
    return`<span style="display:block">${t}</span>`;
  }).join('');
}

function openConceptCard(id){
  const node=nodes.find(n=>n.id===id);
  if(!node)return;
  focusNodeId=id;

  const col=nodeColor(node);
  document.getElementById('ccDot').style.background=col;
  document.getElementById('ccId').textContent=node.isCustom?'★ 커스텀':('§'+node.id);
  document.getElementById('ccId').style.color=col;
  document.getElementById('ccTitle').textContent=node.label;

  // body 렌더
  const bodyEl=document.getElementById('ccBody');
  bodyEl.innerHTML=node.body?renderLatex(node.body):
    '<span style="color:var(--muted)">아직 내용이 없어요 — 질문하면 채워져요</span>';

  // 인사이트
  if(node.insight){
    bodyEl.innerHTML+=`<div class="cc-insight">
      <div class="cc-insight-hdr">💡 나만의 인사이트 / 문제 풀이 노하우</div>
      <div class="cc-insight-body">${node.insight.replace(/\n/g,'<br>')}</div>
    </div>`;
  }

  // 이미지
  const imgs=document.getElementById('ccImgs');imgs.innerHTML='';
  (node.images||[]).forEach(src=>{
    const img=document.createElement('img');img.className='cc-img';img.src=src;
    img.onclick=()=>openLightbox(src);imgs.appendChild(img);
  });

  document.getElementById('ccWiki').innerHTML='';
  document.getElementById('ccAppendArea').style.display='none';
  document.getElementById('conceptCard').classList.add('show');

  // inputBar를 위로 숨김
  document.getElementById('inputBar').style.display='none';
  redraw();

  // Wikipedia 이미지
  fetchWikiImg(node.label);
}

function closeConceptCard(){
  focusNodeId=null;
  document.getElementById('conceptCard').classList.remove('show');
  document.getElementById('inputBar').style.display='';
  redraw();
}

function toggleAppendMode(){
  const area=document.getElementById('ccAppendArea');
  const isOpen=area.style.display!=='none';
  area.style.display=isOpen?'none':'block';
  if(!isOpen) document.getElementById('ccAppendText').focus();
}

function saveAppend(){
  const txt=document.getElementById('ccAppendText').value.trim();
  if(!txt||!focusNodeId) return;
  const node=nodes.find(n=>n.id===focusNodeId);
  if(!node) return;
  node.insight=(node.insight?node.insight+'\n\n':'')+txt;
  document.getElementById('ccAppendText').value='';
  save();
  openConceptCard(focusNodeId); // 카드 갱신
}

// Wikipedia 이미지
async function fetchWikiImg(label){
  const area=document.getElementById('ccWiki');
  if(!label||/^[A-Za-z_=^{}\\]+$/.test(label.replace(/\s/g,''))) return;
  try{
    const q=encodeURIComponent(label.replace(/[_()]/g,' ').trim());
    const res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${q}`,
      {signal:AbortSignal.timeout(4000)});
    if(!res.ok)return;
    const d=await res.json();
    if(d.thumbnail?.source){
      const src=d.thumbnail.source.replace(/\/\d+px-/,'/300px-');
      area.innerHTML=`<img class="cc-wiki-img" src="${src}" alt="${d.title}"
        onclick="openLightbox('${src}')" onerror="this.parentElement.innerHTML=''">
        <div class="cc-wiki-cap">📖 Wikipedia: ${d.title}</div>`;
    }
  }catch{}
}

// ══════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════
function renderHistory(){
  const list=document.getElementById('histList'),empty=document.getElementById('histEmpty');
  list.querySelectorAll('.hist-item').forEach(el=>el.remove());
  if(!sessionCount){empty.style.display='flex';return;}
  empty.style.display='none';

  for(let si=sessionCount;si>=1;si--){
    const d=sessionData[si];
    if(!d)continue;
    const isHi=focusSessionIdx===si;
    const item=document.createElement('div');
    item.className='hist-item'+(isHi?' hi':'');

    // 헤더
    const hdr=document.createElement('div');hdr.className='hist-hdr';
    hdr.innerHTML=`<span class="hist-num">#${si}</span><span class="hist-qtxt">${d.question}</span>`;
    hdr.addEventListener('pointerup',()=>{
      focusSessionIdx=focusSessionIdx===si?null:si;renderHistory();redraw();
    });
    item.appendChild(hdr);

    // 단원 태그
    if(d.chapters?.length){
      const row=document.createElement('div');row.className='hist-tags';
      d.chapters.forEach(ch=>{
        const tag=document.createElement('span');
        const tbEntry=textbooks.flatMap(t=>Object.entries(t.chapters)).find(([k])=>k===ch);
        tag.className='hist-tag';
        tag.textContent=ch+(tbEntry?` · ${tbEntry[1]}`:'');
        tag.addEventListener('pointerup',e=>{
          e.stopPropagation();
          const n=nodes.find(x=>x.id===ch);
          if(n){if(window.innerWidth<700)closeSidebar();openConceptCard(n.id);}
          focusSessionIdx=si;renderHistory();redraw();
        });
        row.appendChild(tag);
      });
      // 커스텀 노드 태그
      (d.customNodes||[]).forEach(cid=>{
        const n=nodes.find(x=>x.id===cid);
        if(!n)return;
        const tag=document.createElement('span');
        tag.className='hist-tag custom';tag.textContent='★ '+n.label;
        tag.addEventListener('pointerup',e=>{
          e.stopPropagation();
          if(window.innerWidth<700)closeSidebar();openConceptCard(cid);
        });
        row.appendChild(tag);
      });
      item.appendChild(row);
    }

    // 설명
    if(d.answer){
      const exp=document.createElement('div');
      exp.className='hist-exp'+(isHi?' show':'');
      exp.innerHTML=d.answer.split('\n').map(l=>{
        const t=l.trim();if(!t)return '<br>';
        const isF=(t.includes('=')&&/[A-Za-z_]/.test(t)&&!/^[가-힣]{2}/.test(t));
        return isF?`<span class="hist-formula">${t}</span>`:`<span style="display:block">${t}</span>`;
      }).join('');
      item.appendChild(exp);
    }
    list.appendChild(item);
  }
}

// FIT VIEW
// ══════════════════════════════════════════
function fitView(){
  if(!nodes.length)return;
  const W=canvas.width,H=canvas.height;
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs)-NR*2.5,maxX=Math.max(...xs)+NR*2.5;
  const minY=Math.min(...ys)-NR*2.5,maxY=Math.max(...ys)+NR*2.5;
  const dw=maxX-minX||1,dh=maxY-minY||1;
  const usableH=H-80;
  scale=Math.min(3,Math.max(0.15,Math.min(W/dw,usableH/dh)*0.85));
  panX=W/2-(minX+dw/2)*scale;
  panY=usableH/2-(minY+dh/2)*scale;
  save();redraw();
}

// ══════════════════════════════════════════
// SMOOTH PAN (애니메이션 이동)
// ══════════════════════════════════════════
function smoothPanTo(tx,ty,dur){
  const sx=panX,sy=panY,st=performance.now(),d=dur||380;
  function step(now){
    const t=Math.min((now-st)/d,1);
    const ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    panX=sx+(tx-sx)*ease;panY=sy+(ty-sy)*ease;
    redraw();if(t<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

}
function clearInputImg(){inputImg=null;renderAttach();}

// ══════════════════════════════════════════
// LIGHTBOX
// ══════════════════════════════════════════
function openLightbox(src){document.getElementById('lbImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.getElementById('lightbox').addEventListener('pointerup',e=>{
  if(e.target===document.getElementById('lightbox'))closeLightbox();
});

// ══════════════════════════════════════════
// CLEAR
// ══════════════════════════════════════════
function confirmClear(){
  if(!confirm('지식망을 초기화할까요? (되돌릴 수 없어요)'))return;
  textbooks=[];nodes=[];edges=[];sessionCount=0;sessionData={};
  panX=0;panY=0;scale=1;focusNodeId=null;focusSessionIdx=null;
  closeConceptCard();save();redraw();
  document.getElementById('onboarding').style.display='flex';
}

// ══════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════
document.getElementById('questionInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))analyze();
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load();
if(nodes.length>0||textbooks.length>0){
  document.getElementById('onboarding').style.display='none';
  setTimeout(()=>{redraw();fitView();},100);
}
</script>
</body>
</html>
